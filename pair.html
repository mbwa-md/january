<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SILA MD | PAIR CODE</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Rajdhani:wght@600&display=swap" rel="stylesheet">

<style>
:root{
  --green:#00ff88;
  --yellow:#ffe600;
  --panel:rgba(6,20,30,.85);
  --text:#eaffff;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  height:100%;
  font-family:Rajdhani,sans-serif;
  color:var(--text);
  background:url("https://files.catbox.moe/36vahk.png") center/cover no-repeat fixed;
  overflow:auto;
  position:relative;
}

/* Dark overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  z-index:0;
}

/* CARD */
.frame{
  position:relative;
  z-index:2;
  max-width:450px;
  margin:auto;
  top:5%;
  margin-bottom:100px;
  padding:34px;
  border-radius:24px;
  background:var(--panel);
  backdrop-filter:blur(18px);
  text-align:center;
  border:2px solid transparent;
  animation:borderFlow 5s linear infinite;
  box-shadow:0 0 50px rgba(0,255,136,.4);
}

@keyframes borderFlow{
  0%{border-image:linear-gradient(0deg,var(--green),var(--yellow)) 1}
  100%{border-image:linear-gradient(360deg,var(--green),var(--yellow)) 1}
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.title{
  font-family:JetBrains Mono,monospace;
  font-size:1.15rem;
  letter-spacing:3px;
  color:var(--yellow);
}

/* LANGUAGE SWITCH */
.lang{
  display:flex;
  gap:6px;
}

.lang button{
  padding:6px 10px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.25);
  background:#020814;
  color:var(--text);
  font-size:.7rem;
  cursor:pointer;
}

.lang button.active{
  background:linear-gradient(135deg,var(--yellow),var(--green));
  color:#02140c;
}

/* SUBTITLE */
#subtitle{
  font-size:.7rem;
  letter-spacing:.35em;
  opacity:.85;
  margin-bottom:22px;
}

/* OPTIONS SECTION */
.options-section{
  margin-bottom:25px;
  text-align:left;
}

.options-title{
  font-size:0.85rem;
  margin-bottom:12px;
  color:var(--yellow);
  font-weight:bold;
}

.option-group{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.option-card{
  flex:1;
  min-width:110px;
  cursor:pointer;
}

.option-card input{
  display:none;
}

.option-card .card-content{
  border:2px solid rgba(0,255,136,.3);
  border-radius:12px;
  padding:12px;
  text-align:center;
  transition:all 0.3s ease;
  cursor:pointer;
  background:rgba(2,8,20,.6);
}

.option-card input:checked + .card-content{
  border-color:var(--green);
  background:linear-gradient(135deg, rgba(0,255,136,0.2), rgba(255,230,0,0.1));
  transform:scale(1.02);
  box-shadow:0 0 15px rgba(0,255,136,.3);
}

.option-card .card-content:hover{
  border-color:var(--yellow);
  transform:translateY(-2px);
}

.option-icon{
  font-size:28px;
  margin-bottom:8px;
}

.option-title{
  font-weight:bold;
  color:var(--green);
  font-size:0.85rem;
  margin-bottom:4px;
}

.option-desc{
  font-size:9px;
  color:rgba(255,255,255,.7);
}

/* INPUT */
.input-container{
  display:flex;
  gap:12px;
  margin-bottom:15px;
}

input{
  flex:1;
  padding:14px;
  border-radius:14px;
  background:#020814;
  border:1px solid rgba(0,255,136,.4);
  color:var(--text);
  font-family:JetBrains Mono;
  font-size:16px;
}

input:focus{
  outline:none;
  border-color:var(--green);
  box-shadow:0 0 10px rgba(0,255,136,.3);
}

button.main{
  padding:14px 18px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:700;
  background:linear-gradient(135deg,var(--yellow),var(--green));
  color:#02130c;
  transition:all 0.3s ease;
}

button.main:hover{
  transform:scale(1.02);
  box-shadow:0 0 20px rgba(0,255,136,.5);
}

button.main:disabled{
  opacity:0.6;
  cursor:not-allowed;
  transform:none;
}

/* MESSAGE */
#waiting-message{
  display:none;
  margin-top:18px;
  padding:14px;
  background:#010614;
  border-radius:14px;
  font-family:JetBrains Mono;
  font-size:.9rem;
  text-align:left;
  word-break:break-all;
}

#copy-btn{
  display:none;
  margin-top:18px;
  width:100%;
  border-radius:30px;
  background:linear-gradient(135deg,#fff200,#00ff88);
  font-weight:700;
  padding:12px;
  border:none;
  cursor:pointer;
  transition:all 0.3s ease;
}

#copy-btn:hover{
  transform:scale(1.02);
}

/* FLOATING WHATSAPP */
.msg-btn{
  position:fixed;
  bottom:22px;
  right:22px;
  background:linear-gradient(135deg,#25d366,#00ff88);
  color:#001;
  padding:14px 18px;
  border-radius:50px;
  font-weight:700;
  text-decoration:none;
  box-shadow:0 0 25px rgba(0,255,136,.8);
  animation:float 2s ease-in-out infinite;
  z-index:5;
}

@keyframes float{
  50%{transform:translateY(-8px)}
}

/* CONTROL BUTTONS */
.controls{
  position:fixed;
  bottom:22px;
  left:22px;
  display:flex;
  gap:10px;
  z-index:5;
}

.controls button{
  padding:10px 14px;
  border:none;
  border-radius:50px;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,var(--yellow),var(--green));
  color:#02130c;
  box-shadow:0 0 18px rgba(0,255,136,.6);
}

.loading{
  display:inline-block;
  width:16px;
  height:16px;
  border:2px solid rgba(0,0,0,.3);
  border-radius:50%;
  border-top-color:#02130c;
  animation:spin 1s ease-in-out infinite;
  margin-right:8px;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="frame">
  <div class="top">
    <div class="title">SILA MD</div>
    <div class="lang">
      <button id="en" class="active">EN</button>
      <button id="sw">SW</button>
    </div>
  </div>

  <div id="subtitle"></div>

  <!-- OPTIONS SECTION -->
  <div class="options-section">
    <div class="options-title">⚙️ SESSION TYPE</div>
    <div class="option-group">
      <label class="option-card">
        <input type="radio" name="option" value="long" checked>
        <div class="card-content">
          <div class="option-icon">📦</div>
          <div class="option-title">Long Session</div>
          <div class="option-desc">Compressed Base64<br>Very long string</div>
        </div>
      </label>
      
      <label class="option-card">
        <input type="radio" name="option" value="short">
        <div class="card-content">
          <div class="option-icon">🔗</div>
          <div class="option-title">Short Session</div>
          <div class="option-desc">Mega Link<br>Short string</div>
        </div>
      </label>
      
      <label class="option-card">
        <input type="radio" name="option" value="creds">
        <div class="card-content">
          <div class="option-icon">📄</div>
          <div class="option-title">Creds.json</div>
          <div class="option-desc">Direct File<br>Download creds.json</div>
        </div>
      </label>
    </div>
  </div>

  <div class="input-container">
    <input id="number" type="tel" placeholder="2557xxxxxxxx">
    <button class="main" id="submit">ENTER</button>
  </div>

  <div id="waiting-message"></div>
  <button id="copy-btn">📋 COPY CODE</button>
</div>

<!-- Floating WhatsApp -->
<a class="msg-btn" href="https://wa.me/255789661031" target="_blank">💬 MESSAGE</a>

<!-- Controls -->
<div class="controls">
  <button id="toggle-overlay">🌙 Toggle Overlay</button>
</div>

<script>
/* DARK OVERLAY */
let overlayOn=true;
const bodyElement=document.body;
const styleSheet=document.styleSheets[0];

function updateOverlay(){
  for(let i=0;i<styleSheet.cssRules.length;i++){
    if(styleSheet.cssRules[i].selectorText === 'body::before'){
      styleSheet.cssRules[i].style.background = `rgba(0,0,0,${overlayOn ? '0.65' : '0'})`;
      break;
    }
  }
}

document.getElementById("toggle-overlay").onclick=()=>{
  overlayOn=!overlayOn;
  updateOverlay();
};

/* LANGUAGE DATA */
const T={
  en:{
    sub:"PAIR CODE SYSTEM",
    ph:"WhatsApp Number",
    enter:"ENTER",
    invalid:"Invalid WhatsApp number! Use format: 2557xxxxxxxx",
    gen:"Generating pairing code...",
    waiting:"Waiting for session...",
    code:"PAIR CODE: ",
    copy:"📋 COPY CODE",
    copied:"✔ COPIED!",
    sessionSent:"Session will be sent to your WhatsApp!",
    credsSent:"📄 creds.json file will be sent to your WhatsApp!"
  },
  sw:{
    sub:"MFUMO WA PAIR CODE",
    ph:"Namba ya WhatsApp",
    enter:"INGIA",
    invalid:"Namba si sahihi! Tumia: 2557xxxxxxxx",
    gen:"Inazalisha code...",
    waiting:"Inasubiri session...",
    code:"CODE: ",
    copy:"📋 NAKILI CODE",
    copied:"✔ IMENAKILIWA!",
    sessionSent:"Session itatumwa kwa WhatsApp yako!",
    credsSent:"📄 faili ya creds.json itatumwa kwa WhatsApp yako!"
  }
};

let lang="en";
const subtitle=document.getElementById("subtitle");
const number=document.getElementById("number");
const submit=document.getElementById("submit");
const msg=document.getElementById("waiting-message");
const copyBtn=document.getElementById("copy-btn");

function setLang(l){
  lang=l;
  subtitle.textContent=T[l].sub;
  number.placeholder=T[l].ph;
  submit.textContent=T[l].enter;
  document.getElementById("en").classList.toggle("active",l==="en");
  document.getElementById("sw").classList.toggle("active",l==="sw");
}
setLang("en");
document.getElementById("en").onclick=()=>setLang("en");
document.getElementById("sw").onclick=()=>setLang("sw");

/* PAIR CODE LOGIC */
let currentCode="";

submit.onclick=async()=>{
  const v=number.value.replace(/\D/g,"");
  if(!v||v.length<10){
    msg.style.display="block"; 
    msg.textContent=T[lang].invalid; 
    copyBtn.style.display="none"; 
    return;
  }
  
  // Get selected option
  const selectedOption = document.querySelector('input[name="option"]:checked').value;
  
  msg.style.display="block"; 
  msg.textContent=T[lang].gen;
  copyBtn.style.display="none";
  submit.disabled=true;
  submit.innerHTML='<span class="loading"></span> PROCESSING...';
  
  try{
    const response=await fetch(`/code?number=${v}&option=${selectedOption}`);
    const data=await response.json();
    
    if(data.code){
      currentCode=data.code;
      msg.textContent=T[lang].code+currentCode;
      copyBtn.style.display="block";
      copyBtn.textContent=T[lang].copy;
      
      // Show info message based on option
      setTimeout(() => {
        if(selectedOption === 'creds'){
          msg.textContent=T[lang].credsSent;
        } else {
          msg.textContent=T[lang].sessionSent;
        }
      }, 2000);
      
      copyBtn.onclick=()=>{
        navigator.clipboard.writeText(currentCode);
        copyBtn.textContent=T[lang].copied;
        setTimeout(()=>copyBtn.textContent=T[lang].copy,2000);
      };
    } else if(data.error){
      msg.textContent="❌ "+data.error;
    } else {
      msg.textContent="❌ Service error. Please try again.";
    }
  } catch(e){
    console.error(e);
    msg.textContent="❌ Network error. Check your connection.";
  } finally {
    submit.disabled=false;
    submit.innerHTML="ENTER";
  }
};

// Allow Enter key
number.addEventListener("keypress", (e) => {
  if(e.key === "Enter") submit.click();
});
</script>
</body>
</html>
